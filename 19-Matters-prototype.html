<style>
  /* ========================================================================
   * shadcn/ui — zinc theme
   * ========================================================================*/
  :root {
    /* Core shadcn tokens (zinc) */
    --background: #ffffff;
    --foreground: #09090b;
    --card: #ffffff;
    --card-foreground: #09090b;
    --popover: #ffffff;
    --popover-foreground: #09090b;
    --primary: #18181b;

    --secondary: #f4f4f5;
    --secondary-foreground: #18181b;
    --muted: #f4f4f5;
    --muted-foreground: #71717a;
    --accent-bg: #f4f4f5;
    --accent-fg: #18181b;
    --destructive: #ef4444;
    --border: #e4e4e7;
    --input: #e4e4e7;
    --ring: #18181b;
    --radius: 0.5rem;

    /* Brand (violet) — used sparingly for M-ID / status / BRIEF */
    --brand: #7c3aed;
    --brand-deep: #6d28d9;
    --brand-soft: #f5f3ff;

    /* Status */
    --doing: #2563eb;     --doing-soft: #eff6ff;
    --success: #16a34a;   --success-soft: #f0fdf4;
    --warning: #ea580c;   --warning-soft: #fff7ed;
    --error: #ef4444;     --error-soft: #fef2f2;

    /* Legacy aliases (existing JS still references these) */
    --bg-1: var(--background);
    --bg-2: #fafafa;
    --bg-3: var(--muted);
    --bg-hover: var(--muted);
    --text-1: var(--foreground);
    --text-2: #52525b;
    --text-3: var(--muted-foreground);
    --text-4: #a1a1aa;
    --accent: var(--brand);
    --accent-soft: var(--brand-soft);
    --accent-deep: var(--brand-deep);
    --border-soft: #f4f4f5;
    --segment-active: #fafafa;
    --segment-cold: #f4f4f5;

    /* Shadows — shadcn style: very subtle */
    --shadow-s: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow-m: 0 2px 4px -1px rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.04);
    --shadow-l: 0 8px 24px -6px rgb(0 0 0 / 0.12), 0 4px 8px -2px rgb(0 0 0 / 0.06);

    --r-s: 6px; --r-m: 8px; --r-l: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: ui-sans-serif, system-ui, -apple-system, "Inter", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 13px; line-height: 1.5;
    color: var(--foreground);
    background: var(--background);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "cv11";
  }
  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  button:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: none;

  }
  input, textarea { font: inherit; color: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #d4d4d8; background-clip: padding-box; border: 2px solid transparent; }

  /* ========= Topbar ========= */
  .topbar {
    height: 48px;
    background: var(--background);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px; gap: 12px;

  .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13px; letter-spacing: -0.01em; }

  .case-tab:hover { background: var(--muted); color: var(--foreground); }
  .case-tab.active { background: var(--foreground); color: var(--background); }
  .topbar-help { font-size: 11px; color: var(--muted-foreground); margin-left: 8px; }

  /* ========= App shell ========= */
  .app { height: calc(100vh - 48px); display: flex; overflow: hidden; background: var(--background); }

  /* ========= DMRail ========= */

  /* ========= Channel list ========= */
  .ch-list {
    width: 256px; background: #fafafa;

    display: flex; flex-direction: column; flex-shrink: 0;

  .ch-list-head { padding: 12px 14px 8px; display: flex; align-items: center; justify-content: space-between; }
  .ch-list-head h2 { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .ch-list-actions { display: flex; gap: 2px; }
  .ch-list-icon {

  .ch-list-icon:hover { background: var(--muted); color: var(--foreground); }
  .ch-list-tabs { display: flex; padding: 2px; gap: 2px; margin: 0 12px 8px; background: var(--muted); border-radius: 7px; }
  .ch-list-tab {

    display: flex; align-items: center; justify-content: center; gap: 5px;
    transition: all 0.12s;
  }
  .ch-list-tab.active { background: var(--background); color: var(--foreground); box-shadow: var(--shadow-s); }
  .ch-list-tab .count { font-size: 10px; color: var(--muted-foreground); font-variant-numeric: tabular-nums; }
  .ch-list-body { flex: 1; overflow-y: auto; padding: 4px 8px 8px; }
  .ch-group { margin-bottom: 8px; }
  .ch-group-head {
    padding: 6px 8px 4px; font-size: 11px; color: var(--muted-foreground);
    font-weight: 500; display: flex; align-items: center; gap: 4px; cursor: pointer;
    letter-spacing: 0.01em;
  }
  .ch-group-head:hover { color: var(--foreground); }
  .ch-group-chev { display: inline-block; transition: transform 0.15s; }
  .ch-group-chev.open { transform: rotate(0deg); }
  .ch-group-chev.closed { transform: rotate(-90deg); }
  .ch-list-item {
    width: 100%; padding: 6px 8px;
    display: flex; align-items: center; gap: 8px;

  .ch-list-item:hover { background: var(--muted); color: var(--foreground); }

  .ch-list-glyph { color: var(--muted-foreground); font-size: 13px; flex-shrink: 0; font-weight: 400; }
  .ch-list-item.active .ch-list-glyph { color: var(--foreground); }
  .ch-list-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-list-matter {

  .ch-list-badge {

  /* ========= Channel main ========= */
  .ch-main { flex: 1; display: flex; flex-direction: column; background: var(--background); min-width: 0; min-height: 0; }
  .ch-header {

  .ch-header-icon {

  .ch-header-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }

  .ch-header-actions { margin-left: auto; display: flex; gap: 2px; }
  .ch-header-btn {
    width: 32px; height: 32px; border-radius: 6px;

  .ch-header-btn:hover { background: var(--muted); color: var(--foreground); }
  .ch-header-btn.active { background: var(--muted); color: var(--foreground); }

  /* Linked-matter dropdown */
  .ch-linked-wrap { position: relative; display: inline-block; }
  .ch-linked-btn {

  .ch-linked-btn:hover { border-color: #d4d4d8; color: var(--foreground); background: var(--muted); }

  .ch-linked-item {

  .ch-linked-item:hover { background: var(--muted); }

  .ch-linked-item-no {

  .ch-linked-item.is-current .ch-linked-item-no { background: var(--foreground); color: var(--background); border-color: var(--foreground); }
  .ch-linked-item-body { flex: 1; min-width: 0; }
  .ch-linked-item-title {
    font-size: 12.5px; font-weight: 500; color: var(--foreground);
    letter-spacing: -0.005em;

  .ch-linked-item-meta {

  .ch-linked-item-status {

  .ch-linked-item-status.active { background: var(--doing-soft); color: var(--doing); }

  .ch-feed { flex: 1; overflow-y: auto; padding: 14px 18px; min-height: 0; }

/* ---------- V5 atoms ---------- */
function StatusBadgeV5({ status }) {
  const map = {
    active:   { bg: 'bg-blue-50',  text: 'text-blue-700',  border: 'border-blue-200', dot: 'bg-blue-500',    label: '进行中' },
    done:     { bg: 'bg-green-50', text: 'text-green-700', border: 'border-green-200', dot: 'bg-green-500',  label: '已完成' },
    archived: { bg: 'bg-zinc-100', text: 'text-zinc-600',  border: 'border-zinc-200', dot: 'bg-zinc-400',    label: '已归档' },
  };
  const s = map[status] || map.active;
  return (
    <span className={`inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium ${s.bg} ${s.text} border ${s.border}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${s.dot}`}></span>
      {s.label}
    </span>
  );
}

function AvatarV5({ name, kind = 'human', size = 20 }) {
  const bg = kind === 'agent'
    ? 'bg-gradient-to-br from-violet-500 to-fuchsia-500 text-white'
    : ['bg-amber-400', 'bg-rose-400', 'bg-sky-400', 'bg-emerald-400'][name.charCodeAt(0) % 4] + ' text-white';
  return (
    <span className={`inline-flex items-center justify-center rounded-full font-medium ${bg}`}
          style={{ width: size, height: size, fontSize: size * 0.45 }}>
      {kind === 'agent' ? '🤖' : name[0]}
    </span>
  );
}

function SourceTag({ source, label }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [open]);
  return (
    <span ref={ref} className="relative inline-block">
      <button
        onClick={(e) => { e.stopPropagation(); setOpen(o => !o); }}
        className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[11px] text-zinc-500 hover:text-zinc-900 hover:bg-zinc-100 border border-transparent hover:border-zinc-200 transition-colors"
      >
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        {label || `${source.channel} · ${source.actor}`}
      </button>
      {open && (
        <div className="popover-enter absolute z-20 left-0 top-full mt-1 w-[360px] rounded-lg border border-zinc-200 bg-white shadow-xl p-3">
          <div className="flex items-center justify-between mb-2 pb-2 border-b border-zinc-100">
            <div className="text-xs font-medium text-zinc-900">{source.channel}</div>
            <div className="text-[10px] text-zinc-400">{source.time} · 原始来源</div>
          </div>
          <div className="space-y-2">
            {source.messages.map((m, i) => (
              <div key={i} className="flex gap-2">
                <AvatarV5 name={m.actor} size={18}/>
                <div className="flex-1 min-w-0">
                  <div className="flex items-baseline gap-1.5">
                    <span className="text-xs font-medium text-zinc-700">{m.actor}</span>
                    <span className="text-[10px] text-zinc-400">{m.time}</span>
                  </div>
                  <div className="text-xs text-zinc-700 leading-relaxed">{m.content}</div>
                </div>
              </div>
            ))}
          </div>
          <div className="mt-2 pt-2 border-t border-zinc-100 flex items-center justify-between text-[10px] text-zinc-400">
            <span>↗ 跳到原消息 (如有权限)</span>
            <button onClick={() => setOpen(false)} className="hover:text-zinc-600">关闭</button>
          </div>
        </div>
      )}
    </span>
  );
}

function v5GroupByDay(events) {
  const groups = {};
  for (const e of events) {
    const parts = e.time.split(' ');
    const day = parts[0];
    const hm  = parts[1] || '';
    if (!groups[day]) groups[day] = [];
    groups[day].push({ ...e, timeHM: hm });
  }
  return groups;
}

function v5DayLabel(day) {
  const today = '5/8';
  const yesterday = '5/7';
  if (day === today) return '今天';
  if (day === yesterday) return '昨天';
  return day;
}

function v5ProcessTimeline(events) {
  const out = events.map(e => ({ ...e }));
  for (let i = 0; i < out.length; i++) {
    if (out[i].kind === 'blocker') {
      for (let j = i + 1; j < out.length; j++) {
        if (out[j].kind === 'unblock') { out[i].resolved = true; break; }
      }
    }
  }
  return out;
}

function EditableText({ value, onSave, className = '', placeholderClass = '', multiline = false, viewClassName = '', readOnly = false }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value);
  useEffect(() => { setDraft(value); }, [value]);
  if (editing) {
    const commit = () => { setEditing(false); if (draft !== value) onSave(draft); };
    const common = {
      autoFocus: true,
      value: draft,
      onChange: (e) => setDraft(e.target.value),
      onBlur: commit,
      onKeyDown: (e) => {
        if (e.key === 'Escape') { setDraft(value); setEditing(false); }
        if (e.key === 'Enter' && !multiline) { e.preventDefault(); e.target.blur(); }
      },
    };
    if (multiline) {
      return <textarea {...common} rows={3} className={`${className} w-full border border-zinc-300 rounded px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-zinc-900/10 focus:border-zinc-400 resize-y`}/>;
    }
    return <input {...common} className={`${className} w-full border border-zinc-300 rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-zinc-900/10 focus:border-zinc-400`}/>;
  }
  if (readOnly) {
    return <span className={viewClassName || className}>{value}</span>;
  }
  return (
    <span className={`${viewClassName || className} v5-editable`}
      onClick={() => setEditing(true)} title="点击编辑">
      {value}
      <svg className="v5-editable-pencil" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </span>
  );
}

const V5_WEEKDAYS = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
function ddlToIso(str) {
  if (!str) return '';
  const m = String(str).match(/(\d+)[\/\-](\d+)/);
  if (!m) return '';
  const y = new Date().getFullYear();
  const mm = String(m[1]).padStart(2, '0');
  const dd = String(m[2]).padStart(2, '0');
  return `${y}-${mm}-${dd}`;
}
function isoToDdl(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-').map(Number);
  if (!y || !m || !d) return iso;
  const dt = new Date(y, m - 1, d);
  return `${m}/${d} ${V5_WEEKDAYS[dt.getDay()]}`;
}

const V5_CHANGE_TYPE_LABELS = {
  create:          '创建',
  goal_change:     '目标变更',
  title_change:    '标题变更',
  ddl_change:      'DDL 变更',
  status_change:   '状态变更',
  channel_change:  '关联群变更',
};

function V5_InlineDiff({ before, after }) {
  return (
    <span className="inline-flex items-baseline gap-1.5">
      <span className="text-zinc-400 line-through decoration-zinc-300">{before}</span>
      <span className="text-zinc-400">→</span>
      <span className="text-zinc-900 font-medium">{after}</span>
    </span>
  );
}

function ChangelogItem({ ev }) {
  const change = ev;
  const label = V5_CHANGE_TYPE_LABELS[change.type] || change.type || '变更';
  const isGoal = change.type === 'goal_change';

  const source = (
    <span className="inline-flex items-center gap-1 text-[11px] text-zinc-400 w-full">
      <AvatarV5 name={change.actor} size={14}/>
      <span className="text-zinc-600 shrink-0">{change.actor}</span>
      {change.from && (
        <>
          <span className="shrink-0">·</span>
          <span className="mono truncate">{change.from}</span>
        </>
      )}
    </span>
  );

  let content;
  if (change.type === 'create') {
    content = (
      <span>初始 DDL <span className="mono text-zinc-900 font-medium">{change.initialDDL}</span></span>
    );
  } else if (change.type === 'goal_change') {
    content = (
      <div className="space-y-0.5">
        {change.added && change.added.map((t, i) => (
          <div key={i} className="flex items-baseline gap-1.5"><span className="text-emerald-600 font-bold shrink-0">+</span><span>"{t}"</span></div>
        ))}
        {change.removed && change.removed.map((t, i) => (
          <div key={i} className="flex items-baseline gap-1.5 text-zinc-500"><span className="text-rose-600 font-bold shrink-0">−</span><span className="line-through">"{t}"</span></div>
        ))}
      </div>
    );
  } else if (change.type === 'ddl_change' || change.type === 'status_change' || change.type === 'title_change') {
    content = <V5_InlineDiff before={change.before} after={change.after}/>;
  } else if (change.type === 'channel_change') {
    content = (
      <div className="space-y-0.5">
        {change.added && change.added.map((c, i) => (
          <div key={i} className="flex items-baseline gap-1.5"><span className="text-emerald-600 font-bold shrink-0">+</span><span className="mono">{c}</span></div>
        ))}
        {change.removed && change.removed.map((c, i) => (
          <div key={i} className="flex items-baseline gap-1.5 text-zinc-500"><span className="text-rose-600 font-bold shrink-0">−</span><span className="mono line-through">{c}</span></div>
        ))}
      </div>
    );
  } else {
    // fallback for any legacy event
    content = <span>{change.text || ''}</span>;
  }

  return (
    <div className={`py-1.5 flex items-baseline gap-3 text-[12px] border-b border-zinc-100 last:border-0 ${isGoal ? 'pl-2 border-l-2 border-violet-500 bg-violet-50/40' : 'pl-[10px]'}`}>
      <span className="mono text-[11px] text-zinc-400 shrink-0 w-[68px]">{change.time}</span>
      <span className={`text-[10px] font-semibold uppercase tracking-[0.08em] shrink-0 w-[72px] ${isGoal ? 'text-violet-700' : 'text-zinc-500'}`}>{label}</span>
      <div className="flex-1 min-w-0 text-zinc-800 leading-relaxed">{content}</div>
      <div className="shrink-0 w-[180px] flex items-baseline">{source}</div>
    </div>
  );
}

function MatterDetailV5({ matter }) {
  const [tab, setTab] = useState('channels');

  const [changelogFilter, setChangelogFilter] = useState('all');
  const [taskFilter, setTaskFilter] = useState('all');
  const [overrides, setOverrides] = useState({});
  const [unlinked, setUnlinked] = useState(new Set());
  const [extraChangelog, setExtraChangelog] = useState([]);
  const [digestEdits, setDigestEdits] = useState({}); // { [channel]: { summary?, timeline?: { [idx]: text } } }
  useEffect(() => { setOverrides({}); setUnlinked(new Set()); setExtraChangelog([]); setDigestEdits({}); }, [matter.id]);
  const field = (k) => overrides[k] !== undefined ? overrides[k] : matter[k];
  const setField = (k, v) => setOverrides(prev => ({ ...prev, [k]: v }));
  const title   = field('title');
  const status  = field('status');
  const ddl     = field('ddl');
  const creator = field('creator');
  const owners  = field('owners') || [matter.owner].filter(Boolean);
  const mainGoal = overrides.mainGoalText !== undefined
    ? { ...matter.mainGoal, text: overrides.mainGoalText }
    : matter.mainGoal;
  const visibleDigests = matter.channelDigests
    .filter(d => !unlinked.has(d.channel))
    .map(d => {
      const edit = digestEdits[d.channel] || {};
      return {
        ...d,
        summary: edit.summary !== undefined ? edit.summary : d.summary,
        timeline: d.timeline && d.timeline.map((ev, idx) => ({
          ...ev,
          text: edit.timeline && edit.timeline[idx] !== undefined ? edit.timeline[idx] : ev.text,
        })),
      };
    });
  const unlinkChannel = (name) => {
    setUnlinked(prev => { const s = new Set(prev); s.add(name); return s; });

    const ts = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    setExtraChangelog(prev => [...prev, { time: ts, type: 'channel_change', actor: '王宜林', removed: [name] }]);

            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>

const Citation = ({ n }) => <span className="m-cite">[{n}]</span>;

function statusLabel(s) {
  return { active: '进行中', done: '已完成', archived: '已归档' }[s] || s;

function renderBriefText(text) {
  const parts = text.split(/(\[\d+\])/g);
  return parts.map((p, i) => {
    const m = p.match(/^\[(\d+)\]$/);
    if (m) return <Citation key={i} n={m[1]}/>;
    return <span key={i}>{p}</span>;
  });
}

function ChannelMessage({ msg, isMulti, onSelectMulti, dimUnselected, onMatterCardOpen, openMatter }) {
  if (msg.kind === 'sep') return <div className="ch-day-sep">{msg.text}</div>;
  const isAgent = msg.who.kind === 'agent';

  if (msg.kind === 'matter_card') {
    return (
      <div className="ch-msg" onClick={() => onSelectMulti && onSelectMulti(msg)}>
        <div className="ch-msg-avatar"><Avatar user={msg.who} size={32}/></div>
        <div className="ch-msg-body">
          <div className="ch-msg-meta">
            <span className="ch-msg-name">{msg.who.name}</span>
            <span className="ch-msg-time">{msg.when}</span>
          </div>
          {msg.text && <div className="ch-msg-text" style={{ marginBottom: 8 }}>{msg.text}</div>}
          <ChatMatterCard matter={msg.matter} onOpen={onMatterCardOpen} isOpen={openMatter && openMatter.id === msg.matter.id}/>
        </div>
      </div>
    );
  }

  if (msg.kind === 'matter_ref') {
    return (
      <div className="ch-msg" onClick={() => onSelectMulti && onSelectMulti(msg)}>
        <div className="ch-msg-avatar"><Avatar user={msg.who} size={32}/></div>
        <div className="ch-msg-body">
          <div className="ch-msg-meta">
            <span className="ch-msg-name">{msg.who.name}</span>
            <span className="ch-msg-time">{msg.when}</span>
          </div>
          <div className="ch-msg-quote" style={{ cursor: 'pointer' }} onClick={() => onMatterCardOpen && onMatterCardOpen(msg.matter)}>
            <ChatMatterID id={msg.matter.id}/>{' '}{msg.matter.title}
          </div>
          {msg.text && <div className="ch-msg-text">{msg.text}</div>}
        </div>
      </div>
    );
  }

  return (
    <div className={'ch-msg' + (msg.mention ? ' is-mention' : '') + (isMulti ? ' is-multi-selected' : '') + (dimUnselected && !isMulti && !msg.mention ? ' is-dim' : '')}
      onClick={() => onSelectMulti && onSelectMulti(msg)}>
      <div className="ch-msg-avatar"><Avatar user={msg.who} size={32}/></div>
      <div className="ch-msg-body">
        <div className="ch-msg-meta">
          <span className={'ch-msg-name' + (isAgent ? ' bot' : '')}>{msg.who.name}</span>
          {isAgent && <span className="ch-bot-tag">AGENT</span>}
          <span className="ch-msg-time">{msg.when}</span>
        </div>
        {msg.quote && <div className="ch-msg-quote">引用 · {msg.quote.name}</div>}
        <div className="ch-msg-text">{msg.text}</div>
        {msg.file && (
          <div className="ch-msg-file">
            <FileGlyph type={msg.file.type} size={28}/>
            <div className="ch-msg-file-info">
              <div className="ch-msg-file-name">{msg.file.name}</div>
              <div className="ch-msg-file-size">{msg.file.size}</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function MultiActionBar({ count, linkedMatters, onForwardOne, onForwardMerge, onCreate, onLink, onDelete, onClose }) {
  const [syncOpen, setSyncOpen] = useState(false);
  const syncRef = useRef(null);
  useEffect(() => {
    if (!syncOpen) return;
    const close = (e) => { if (syncRef.current && !syncRef.current.contains(e.target)) setSyncOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [syncOpen]);
  return (
    <div className="multi-bar" onClick={e => e.stopPropagation()}>
      <div className="multi-bar-item" onClick={onForwardOne}>逐条转发</div>
      <div className="multi-bar-sep"/>
      <div className="multi-bar-item" onClick={onForwardMerge}>合并转发</div>
      <div className="multi-bar-sep"/>
      <div className="multi-bar-item" onClick={onCreate}>创建新事项</div>
      <div className="multi-bar-sep"/>
      <div ref={syncRef} className="multi-bar-item" onClick={() => setSyncOpen(o => !o)}>
        同步到任务
        {syncOpen && (
          <div className="multi-bar-sub" onClick={e => e.stopPropagation()}>
            <div className="multi-bar-sub-head">当前群聊关联的任务 · {linkedMatters.length}</div>
            {linkedMatters.length === 0 ? (
              <div className="multi-bar-sub-empty">当前群聊未关联任务</div>
            ) : (
              linkedMatters.map(m => (
                <button key={m.id} className="multi-bar-sub-item"
                  onClick={() => { setSyncOpen(false); onLink(m); }}>
                  <span className="multi-bar-sub-no">{m.id}</span>
                  <span className="multi-bar-sub-title">{m.title}</span>
                </button>
              ))
            )}
          </div>
        )}
      </div>
      <div className="multi-bar-sep"/>
      <div className="multi-bar-item delete" onClick={onDelete}>删除</div>
      <div className="multi-bar-sep"/>
      <div className="multi-bar-close" onClick={onClose} title="取消">×</div>
    </div>
  );
}

function ChannelArea({ activeChan, multiSel, setMultiSel, onSmartCreate, onLinked, activeMatter, setActiveMatter }) {
  const feed = CHANNEL_FEED[activeChan] || CHANNEL_FEED['#Octo设计群'];
  const [linkedOpen, setLinkedOpen] = useState(false);

  const linkedMatters = MATTER_LIST.filter(m => m.channels.includes(activeChan));
  const primaryMatter = linkedMatters.find(m => m.id === activeMatter) || linkedMatters[0];

  const onMsgClick = (msg) => {
    if (multiSel.length === 0) return;
    setMultiSel(multiSel.includes(msg) ? multiSel.filter(x => x !== msg) : [...multiSel, msg]);
  };
  const onMsgContext = (e, msg) => {
    e.preventDefault();
    if (!multiSel.includes(msg)) setMultiSel([...multiSel, msg]);
  };
  const startMulti = () => {
    const seeded = feed.messages.filter(m => m.kind === 'msg' && m.mention);
    setMultiSel(seeded);
  };
  const dim = multiSel.length > 0;

  return (
    <div className="ch-main">
      <div className="ch-header">
        <div className="ch-header-icon">{activeChan.slice(1, 2)}</div>
        <div>
          <div className="ch-header-name">{activeChan}</div>
          <div className="ch-header-meta">
            {feed.members} 人
            <span className="ch-linked-wrap">
              {' · '}
              <button
                className={'ch-linked-btn' + (linkedOpen ? ' open' : '')}
                onClick={(e) => { e.stopPropagation(); setLinkedOpen(o => !o); }}
              >
                <span>Matters</span>
                {linkedMatters.length > 0 && <span className="ch-linked-btn-no">{linkedMatters.length}</span>}
                <span className="ch-linked-btn-chev">{I.chev}</span>
              </button>
              {linkedOpen && (
                <>
                  <div className="ch-linked-pop-mask" onClick={() => setLinkedOpen(false)}></div>
                  <div className="ch-linked-pop" onClick={e => e.stopPropagation()}>
                    <div className="ch-linked-pop-head">
                      {activeChan} 关联的 Matter · {linkedMatters.length}
                    </div>
                    {linkedMatters.length === 0 && (
                      <div className="ch-linked-empty">当前群聊未关联任何 Matter</div>
                    )}
                    {linkedMatters.map(m => {
                      const isCurrent = m.id === activeMatter;
                      return (
                        <button
                          key={m.id}
                          className={'ch-linked-item' + (isCurrent ? ' is-current' : '')}
                          onClick={() => { setActiveMatter(m.id); setLinkedOpen(false); }}
                        >
                          <span className="ch-linked-item-no">{m.id}</span>
                          <div className="ch-linked-item-body">
                            <div className="ch-linked-item-title">{m.title}</div>
                            <div className="ch-linked-item-meta">
                              <span className={'ch-linked-item-status ' + m.status}>
                                <span className="ch-linked-item-dot"></span>
                                {statusLabel(m.status)}
                              </span>
                              <span>DDL {m.due}</span>
                              <span>· {m.owner.name}</span>
                            </div>
                          </div>
                          {isCurrent && <span className="ch-linked-item-check">✓</span>}
                        </button>
                      );
                    })}
                  </div>
                </>
              )}
            </span>
          </div>
        </div>
        <div className="ch-header-actions">
          <button className="ch-header-btn" onClick={startMulti} title="多选示例">☰</button>
          <button className="ch-header-btn">{I.search}</button>
          <button className="ch-header-btn">{I.more}</button>
        </div>
      </div>
      <div className="ch-feed">
        {feed.messages.map((msg, i) => (
          <div key={i} onContextMenu={(e) => msg.kind === 'msg' && onMsgContext(e, msg)}>
            <ChannelMessage msg={msg}
              isMulti={multiSel.includes(msg)}
              onSelectMulti={onMsgClick}
              dimUnselected={dim}/>
          </div>
        ))}
      </div>
      {multiSel.length > 0 && (
        <MultiActionBar count={multiSel.length} linkedMatters={linkedMatters}
          onForwardOne={() => { alert('逐条转发 ' + multiSel.length + ' 条消息'); setMultiSel([]); }}
          onForwardMerge={() => { alert('合并转发 ' + multiSel.length + ' 条消息'); setMultiSel([]); }}
          onCreate={() => { onSmartCreate(multiSel.length); setMultiSel([]); }}
          onLink={(m) => { setMultiSel([]); onLinked(m); }}
          onDelete={() => { alert('删除 ' + multiSel.length + ' 条消息'); setMultiSel([]); }}
          onClose={() => setMultiSel([])}/>
      )}
      <div className="ch-input-wrap">
        <div className="ch-input-box">
          <span className="ch-input-text placeholder">在 {activeChan} 发消息... (无 sticky 输入框 — 关联 Matter 走多选关联)</span>
          <div className="ch-input-actions">
            <button className="ch-input-action-btn" title="@">@</button>
            <button className="ch-input-action-btn" title="附件">{I.paper}</button>
            <button className="ch-input-action-btn" title="待办">☑</button>
            <button className="ch-input-send">{I.send} 发送</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function SmartCreateModal({ count, blank, onClose, onCreate }) {
  const [title, setTitle] = useState(blank ? '' : 'Octo 产品策略 PPT 打磨');
  const [brief, setBrief] = useState(blank ? '' : '辉哥要 5/15 给董事会做 30min PPT, 讲清 Octo 跟 Linear / 玛蒂卡的差异 + GTM 路径。重点 "Agents do, Humans decide"; Coze 接入路径是关键钩子。');
  const [owners, setOwners] = useState(blank ? [] : [USERS.wyl]);
  const [due, setDue] = useState(blank ? '' : '2026-05-15');
  const [ownerPickOpen, setOwnerPickOpen] = useState(false);
  const ownerRef = useRef(null);
  useEffect(() => {
    if (!ownerPickOpen) return;
    const close = (e) => { if (ownerRef.current && !ownerRef.current.contains(e.target)) setOwnerPickOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [ownerPickOpen]);

  const toggleOwner = (u) => {
    setOwners(prev => prev.find(x => x.id === u.id) ? prev.filter(x => x.id !== u.id) : [...prev, u]);
  };
  const removeOwner = (u) => setOwners(prev => prev.filter(x => x.id !== u.id));

  const canCreate = title.trim() && brief.trim() && owners.length > 0 && due;

  return (
    <div className="modal-mask" onClick={onClose}>
      <div className="smart-modal" onClick={e => e.stopPropagation()}>
        <div className="smart-modal-head">
          <div className="smart-modal-title">
            {!blank && <span className="smart-modal-spark">{I.spark}</span>}
            {blank ? '新建事项' : '智能创建事项'}
          </div>
          <div className="smart-modal-sub">
            {blank ? '手动填写 4 个必填字段' : `从 ${count} 条选中消息蒸馏 · 4 字段 AI 已预填, 全部必填`}
          </div>
        </div>
        <div className="smart-modal-body">
          <div className="form-field">
            <label className="form-label">
              标题 <span className="req">*</span>
              {!blank && <span className="ai-hint">AI 已填</span>}
            </label>
            <input className="form-input" value={title} onChange={e => setTitle(e.target.value)} placeholder="事件标题"/>
          </div>
          <div className="form-field">
            <label className="form-label">
              主要目标 <span className="req">*</span>
              {!blank && <span className="ai-hint">AI 已填</span>}
            </label>
            <textarea className="form-textarea" value={brief} onChange={e => setBrief(e.target.value)} placeholder="一句话说清这件事"/>
          </div>
          <div className="form-field">
            <label className="form-label">
              负责人 <span className="req">*</span>
              {!blank && <span className="ai-hint">AI 已填</span>}
              <span style={{ marginLeft: 6, color: 'var(--text-3)', fontSize: 11 }}>支持多选</span>
            </label>
            <div ref={ownerRef} style={{ position: 'relative' }}>
              <div className="form-pickerow" onClick={() => setOwnerPickOpen(o => !o)} style={{ flexWrap: 'wrap', gap: 6, minHeight: 40 }}>
                {owners.length === 0 ? (
                  <>
                    <span>{I.user}</span>
                    <span className="empty">{blank ? '请选择负责人 (可多选)' : '未识别 — 请选择负责人'}</span>
                  </>
                ) : (
                  <>
                    {owners.map(u => (
                      <span key={u.id}
                        onClick={(e) => { e.stopPropagation(); removeOwner(u); }}
                        style={{ display: 'inline-flex', alignItems: 'center', gap: 5, padding: '3px 8px 3px 3px', background: 'var(--muted)', borderRadius: 999, fontSize: 12, cursor: 'pointer' }}
                        title="移除">
                        <Avatar user={u} size={18}/>
                        <span>{u.name}</span>
                        <span style={{ color: 'var(--text-3)', fontSize: 12 }}>×</span>
                      </span>
                    ))}
                    <span style={{ marginLeft: 'auto', color: 'var(--text-3)', fontSize: 11 }}>+ 添加</span>
                  </>
                )}
              </div>
              {ownerPickOpen && (
                <div className="popover-enter" style={{ position: 'absolute', top: 'calc(100% + 4px)', left: 0, right: 0, zIndex: 30, background: '#fff', border: '1px solid var(--border)', borderRadius: 8, boxShadow: 'var(--shadow-l)', padding: 4, maxHeight: 240, overflowY: 'auto' }}>
                  {Object.values(USERS).map(u => {
                    const picked = owners.find(x => x.id === u.id);
                    return (
                      <button key={u.id} onClick={() => toggleOwner(u)}
                        style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 8, padding: '6px 8px', borderRadius: 5, fontSize: 12.5, background: picked ? 'var(--muted)' : 'transparent', textAlign: 'left' }}>
                        <Avatar user={u} size={18}/>
                        <span>{u.name}</span>
                        {picked && <span style={{ marginLeft: 'auto', fontWeight: 600 }}>✓</span>}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
          <div className="form-field">
            <label className="form-label">
              Deadline <span className="req">*</span>
              {!blank && <span className="ai-hint">AI 已填</span>}
            </label>
            <div className="form-pickerow" onClick={() => alert('选择日期')}>
              {due ? (
                <>
                  <span>{I.cal}</span>
                  <span>{due}</span>
                  <span style={{ marginLeft: 'auto', color: 'var(--text-3)', fontSize: 11 }}>切换</span>
                </>
              ) : (
                <>
                  <span>{I.cal}</span>
                  <span className="empty">{blank ? '请选一个日期' : '未识别 — 请选一个日期'}</span>
                </>
              )}
            </div>
          </div>
        </div>
        <div className="smart-modal-foot">
          <button className="btn btn-cancel" onClick={onClose}>取消</button>
          <button className="btn btn-primary" disabled={!canCreate} onClick={() => onCreate({ title, brief, owners, due })}>
            创建事项
          </button>
        </div>
      </div>
    </div>
  );
}

    { id: 'done',     name: '已完成', desc: '已交付' },

    <span className={'m-status ' + status} onClick={() => setOpen(!open)}>
      <span className="m-status-dot"></span>
      {statusLabel(status)}
      <span className="m-status-chev">▾</span>

        <div className="status-pop" onClick={e => e.stopPropagation()}>

  );
}

            <div className="anchor-pop-msg-content">
              <div className="anchor-pop-msg-name">{mainActor.name}</div>
              <div className="anchor-pop-msg-text">{anchor.content}</div>
            </div>
          </div>
          {anchor.contextAfter && anchor.contextAfter.map((m, i) => (
            <div key={'a' + i} className="anchor-pop-msg">
              <span className="anchor-pop-msg-time">{m.time}</span>
              <div className="anchor-pop-msg-content">
                <div className="anchor-pop-msg-name">{m.who.name}</div>
                <div className="anchor-pop-msg-text">{m.text}</div>
              </div>
            </div>
          ))}
        </div>
        <div className="anchor-pop-foot">
          <span className="anchor-pop-permission">{hasPermission ? '✓ 你在该 channel' : '⊘ 你不在该 channel'}</span>
          <button className={'anchor-pop-jump ' + (hasPermission ? 'enabled' : 'disabled')}
            disabled={!hasPermission}
            onClick={() => hasPermission && alert('跳转到原对话 (' + anchor.channel + ')')}>
            {I.jump} 跳到原对话
          </button>
        </div>
      </div>
    </>
  );
}

function SegmentNode({ node, onShowAnchor }) {
  const isAgent = node.actor.kind === 'agent';
  return (
    <div className="node">
      <div className="node-rail"><Avatar user={node.actor} size={26}/></div>
      <div className="node-body">
        <div className="node-row1">
          <span className={'node-actor' + (isAgent ? ' bot' : '')}>{node.actor.name}</span>
          {isAgent && <span className="node-bot-tag">AGENT</span>}
          <span className="node-time">{node.timestamp}</span>
          <button className="node-anchor-btn" onClick={(e) => onShowAnchor(node, e)}>
            {I.anchor} 看上下文
          </button>
        </div>
        {node.quote && <div className="node-quote">引用 · {node.quote.name}</div>}
        <div className="node-text">{node.anchor.content}</div>
        {node.kind === 'deliverable' && node.file && (
          <div className="node-file">
            <FileGlyph type={node.file.type} size={30}/>
            <div className="node-file-info">
              <div className="node-file-name">{node.file.name}</div>
              <div className="node-file-size">{node.file.size}{node.summary && ' · ' + node.summary}</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function SegmentBlock({ segment, isLast, onShowAnchor, onPullSegment }) {
  const [open, setOpen] = useState(true);
  return (
    <div className={'segment ' + (segment.isActive ? 'active-bg' : 'cold-bg') + (open ? ' open' : '')}>
      <div className="segment-head" onClick={() => setOpen(!open)}>
        <span className={'segment-chev' + (open ? ' open' : '')}>{I.chevR}</span>
        <span className="segment-channel">{segment.channel}</span>
        <span className={'segment-pill ' + (segment.isActive ? 'active' : 'cold')}>
          {segment.isActive ? '活跃' : '冷段'}
        </span>
        <span className="segment-summary">{segment.summary}</span>
        <span className="segment-meta">
          {segment.nodes.length} 节点 · 最近 {segment.lastPulledAt} · 触发 {segment.pullCount}×
        </span>
      </div>
      {open && (
        <div className="segment-body">
          <button className="seg-pull-btn" onClick={() => onPullSegment(segment)}>
            {I.pull} 一键总结本群跟本 Matter 相关的内容
          </button>
          {segment.nodes.map((n) => (
            <SegmentNode key={n.id} node={n} onShowAnchor={onShowAnchor}/>
          ))}
        </div>
      )}
    </div>
  );
}

function MatterBody({ matter, onShowAnchor, onPullSegment }) {
  if (!matter.segments || matter.segments.length === 0) {
    return <div className="seg-empty">还没有任何段 — 多选关联或在某 channel 一键总结</div>;
  }
  return (
    <div>
      {matter.segments.map((s, i) => (
        <SegmentBlock key={s.id} segment={s} isLast={i === matter.segments.length - 1}
          onShowAnchor={onShowAnchor} onPullSegment={onPullSegment}/>
      ))}
    </div>
  );
}

/* ============================================================
 * Matter Panel
 * ============================================================ */

function MatterPanel({ matter, large, onStatus, onShowAnchor, onPullSegment }) {
  return (
    <>
      <MatterHead matter={matter} onStatus={onStatus} onForward={() => alert('转发到 channel/thread (复用 Smart Summary forward)')} large={large}/>
      <div className="m-panel-body">
        <MatterBody matter={matter} onShowAnchor={onShowAnchor} onPullSegment={onPullSegment}/>
      </div>
    </>
  );
}

/* ============================================================
 * Sidebar mode (3-tab)
 * ============================================================ */

function SidebarList({ activeId, onPick, currentUser }) {
  const [tab, setTab] = useState('owner');  // 'owner' | 'creator' | 'all'

  const filtered = MATTER_LIST.filter(m => {
    if (tab === 'owner')   return m.owner.id === currentUser.id;
    if (tab === 'creator') return m.creator.id === currentUser.id;
    return true;
  });

  const counts = {
    owner:   MATTER_LIST.filter(m => m.owner.id === currentUser.id).length,
    creator: MATTER_LIST.filter(m => m.creator.id === currentUser.id).length,
    all:     MATTER_LIST.length,
  };

  return (
    <div className="sidebar-list">
      <div className="sl-head">
        <h2>事项</h2>
        <button className="sl-new">{I.plus} 新建</button>
      </div>
      <div className="sl-tabs">
        <button className={'sl-tab' + (tab === 'owner' ? ' active' : '')} onClick={() => setTab('owner')}>
          我负责的 <span className="count">{counts.owner}</span>
        </button>
        <button className={'sl-tab' + (tab === 'creator' ? ' active' : '')} onClick={() => setTab('creator')}>
          我发起的 <span className="count">{counts.creator}</span>
        </button>
        <button className={'sl-tab' + (tab === 'all' ? ' active' : '')} onClick={() => setTab('all')}>
          全部 <span className="count">{counts.all}</span>
        </button>
      </div>
      <div className="sl-list">
        {filtered.map(m => (
          <div key={m.id} className={'sl-card' + (m.id === activeId ? ' active' : '')} onClick={() => onPick(m.id)}>
            <div className="sl-card-row1">
              <span className="m-id">{m.id}</span>
              <span className={'m-status ' + m.status} style={{ cursor: 'default' }}>
                <span className="m-status-dot"></span>{statusLabel(m.status)}
              </span>
              <span className={'sl-card-due' + (m.due.includes('5/15') || m.due.includes('5/12') ? ' today' : '')}>{m.due}</span>
            </div>
            <div className="sl-card-title">{m.title}</div>
            <div className="sl-card-meta">
              <Avatar user={m.owner} size={16}/>
              <span>{m.owner.name}</span>
              <span style={{ color: 'var(--text-4)' }}>·</span>
              <span className="sl-card-channel">{m.channels[0]}</span>
              {m.channels.length > 1 && <span style={{ color: 'var(--text-3)' }}>+{m.channels.length - 1}</span>}
            </div>
          </div>
        ))}
        <div className="sl-collapsed">已归档 (0) · 折叠展开</div>
      </div>
    </div>
  );
}

/* ============================================================
 * APP ROOT
 * ============================================================ */

function App() {
  const [mode, setMode] = useState('channel');  // 'channel' | 'sidebar'
  const [activeMatter, setActiveMatter] = useState('M-2451');
  const [activeChan, setActiveChan] = useState('#Octo设计群');
  const [paneW, setPaneW] = useState(520);
  const [multiSel, setMultiSel] = useState([]);
  const [statusOverride, setStatusOverride] = useState({});
  const [smartCreate, setSmartCreate] = useState(null);
  const [anchorPop, setAnchorPop] = useState(null);

  const currentUser = USERS.wyl;

  // resize
  const dragRef = useRef(null);
  const startDrag = (e) => {
    e.preventDefault();
    const startX = e.clientX, startW = paneW;
    dragRef.current = { dragging: true };
    const move = (ev) => setPaneW(Math.max(420, Math.min(820, startW + (startX - ev.clientX))));
    const up = () => { dragRef.current = null; window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  const matter = { ...MATTERS[activeMatter] };
  if (statusOverride[activeMatter]) matter.status = statusOverride[activeMatter];

  const onStatus = (s) => setStatusOverride({ ...statusOverride, [activeMatter]: s });

  const onShowAnchor = (node, e) => {
    const rect = e.target.getBoundingClientRect();
    const popX = Math.min(rect.right - 380, window.innerWidth - 470);
    const popY = Math.min(rect.top + 22, window.innerHeight - 400);
    // permission demo: 王宜林 in #Octo设计群 + #辉哥-DM but not in #董事会-PPT
    const userChannels = ['#Octo设计群', '#辉哥-DM', '#HR-策略', '#高管沟通群', '#产品负责人群'];
    const hasPermission = userChannels.includes(node.anchor.channel);
    setAnchorPop({ anchor: node.anchor, mainActor: node.actor, x: popX, y: popY, hasPermission });
  };

  const onPullSegment = (seg) => {
    alert('一键总结 ' + seg.channel + ' 跟本 Matter 相关的内容\n\n→ 后台调 Octo 自带 Agent 扫消息\n→ 按 Feed Schema 整理成新节点\n→ 增量加进段 (DB unique 索引去重)');
  };

  const onSmartCreate = (count) => setSmartCreate({ count });

  return (
    <>
      <div className="topbar">
        <div className="brand"><span className="brand-mark">O</span><span>Octo · Matter</span></div>
      </div>

      <div className="app">
        <DMRail
          active={mode === 'sidebar' ? 'matters' : 'chat'}
          onPick={(id) => {
            if (id === 'chat') setMode('channel');
            else if (id === 'matters') setMode('sidebar');
          }}/>

        {mode === 'channel' && (
          <>
            <ChannelList activeChan={activeChan} onPick={setActiveChan}/>
            <div className="layout">
              <ChannelArea activeChan={activeChan}
                multiSel={multiSel} setMultiSel={setMultiSel}
                onSmartCreate={onSmartCreate}
                activeMatter={activeMatter} setActiveMatter={setActiveMatter}
                onLinked={(m) => alert('已同步到任务 ' + m.id + ' (' + m.title + ')\n\n→ 找到对应 channel 的 segment\n→ 增量加 nodes (去重)')}/>
              <div className={'resize-handle' + (dragRef.current?.dragging ? ' dragging' : '')} onMouseDown={startDrag}></div>
              <div className="m-panel" style={{ width: paneW + 'px', overflowY: 'auto' }}>
                {V5_MATTERS[activeMatter] && <MatterDetailV5 matter={V5_MATTERS[activeMatter]}/>}
              </div>
            </div>
          </>
        )}

        {mode === 'sidebar' && (
          <>
            <SidebarV5 active={activeMatter} onPick={setActiveMatter} onNew={() => setSmartCreate({ blank: true })}/>
            <main className="flex-1 overflow-y-auto bg-white">
              {V5_MATTERS[activeMatter] && <MatterDetailV5 matter={V5_MATTERS[activeMatter]}/>}
            </main>
          </>
        )}
      </div>

      {smartCreate && (
        <SmartCreateModal count={smartCreate.count} blank={smartCreate.blank}
          onClose={() => setSmartCreate(null)}
          onCreate={(data) => {
            setSmartCreate(null);
            if (smartCreate.blank) {
              alert('已创建事项: ' + data.title + '\n\n负责人: ' + data.owners.map(u => u.name).join('、') + '\nDDL: ' + data.due);
            } else {
              alert('已创建事项: ' + data.title + '\n\n负责人: ' + data.owners.map(u => u.name).join('、') + '\nDDL: ' + data.due + '\n\n这 ' + smartCreate.count + ' 条消息自动作为 #' + activeChan.slice(1) + ' segment 首段');
            }
          }}/>
      )}

      {anchorPop && (
        <ContextAnchorPopover anchor={anchorPop.anchor} mainActor={anchorPop.mainActor}
          x={anchorPop.x} y={anchorPop.y} hasPermission={anchorPop.hasPermission}
          onClose={() => setAnchorPop(null)}/>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
